<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORN Enclosures | AI-Powered Enclosure Finder | Sydney</title>
<meta name="description" content="CORN Enclosures — find the right enclosure instantly with our AI assistant. Custom sheet metal fabrication, 1000+ units in stock in Sydney.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--corn-yellow:#F5C518;--corn-dark:#1A1A1A;--corn-darker:#0D0D0D;--corn-steel:#2A2D35;--corn-light:#E8E6E1;--corn-accent:#FF6B35;--corn-white:#FAFAF8}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{font-family:'Barlow',sans-serif;background:var(--corn-darker);color:var(--corn-light);min-height:100%;display:flex;flex-direction:column}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.3}
.page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1}
.page.has-messages{justify-content:flex-start;padding-top:3rem}
.logo{font-size:4rem;margin-bottom:.5rem;transition:all .4s}
.page.has-messages .logo{font-size:2.5rem}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);letter-spacing:.03em;color:var(--corn-white);text-align:center;line-height:1;margin-bottom:.6rem;transition:all .4s}
.page.has-messages h1{font-size:clamp(1.5rem,3vw,2rem);margin-bottom:.3rem}
.subtitle{font-family:'Barlow',sans-serif;font-size:1.1rem;font-weight:300;color:rgba(232,230,225,.5);text-align:center;margin-bottom:2.5rem;transition:all .4s}
.page.has-messages .subtitle{font-size:.85rem;margin-bottom:1rem}
.input-wrap{width:100%;max-width:620px;display:flex;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));margin-bottom:1.2rem;flex-shrink:0}
.input-field{flex:1;font-family:'Barlow',sans-serif;font-size:1.05rem;padding:1rem 1.4rem;background:rgba(42,45,53,.7);border:1px solid rgba(245,197,24,.25);border-right:none;color:var(--corn-light);outline:none;transition:border-color .3s}
.input-field::placeholder{color:rgba(232,230,225,.35)}
.input-field:focus{border-color:var(--corn-yellow)}
.send-btn{font-family:'Space Mono',monospace;font-size:.8rem;text-transform:uppercase;letter-spacing:.12em;padding:1rem 2rem;background:var(--corn-yellow);color:var(--corn-dark);border:none;cursor:pointer;font-weight:700;transition:all .3s;white-space:nowrap}
.send-btn:hover{background:var(--corn-accent);color:#fff}
.send-btn:disabled{opacity:.5;cursor:not-allowed}
.browse-link{font-family:'Space Mono',monospace;font-size:.75rem;text-transform:uppercase;letter-spacing:.15em;color:rgba(232,230,225,.4);text-decoration:none;transition:color .3s;flex-shrink:0}
.browse-link:hover{color:var(--corn-yellow)}
.page.has-messages .browse-link{display:none}
.chat-thread{width:100%;max-width:620px;display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.5rem;overflow-y:auto;flex:1;padding:.5rem 0}
.chat-thread::-webkit-scrollbar{width:4px}
.chat-thread::-webkit-scrollbar-track{background:transparent}
.chat-thread::-webkit-scrollbar-thumb{background:rgba(245,197,24,.3);border-radius:2px}
.chat-msg{padding:.8rem 1.2rem;border-radius:4px;font-family:'Barlow',sans-serif;font-size:.95rem;line-height:1.6;max-width:85%;word-wrap:break-word}
.chat-msg.user{background:var(--corn-dark);color:var(--corn-light);align-self:flex-end;border:1px solid rgba(245,197,24,.15)}
.chat-msg.assistant{background:var(--corn-steel);color:var(--corn-light);align-self:flex-start;border:1px solid rgba(245,197,24,.1)}
.typing{display:flex;gap:4px;padding:.8rem 1.2rem;align-self:flex-start}
.typing span{width:6px;height:6px;background:var(--corn-yellow);border-radius:50%;animation:bounce 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}
@media(max-width:600px){.input-wrap{flex-direction:column;clip-path:none}.input-field{border-right:1px solid rgba(245,197,24,.25);border-bottom:none}.send-btn{padding:.8rem}.chat-msg{max-width:95%}}
</style>
</head>
<body>
<div class="page" id="page">
<div class="logo">🌽</div>
<h1>WHAT ENCLOSURE DO YOU NEED?</h1>
<p class="subtitle">Ask our AI — it knows the entire CORN range</p>
<div class="chat-thread" id="thread"></div>
<div class="input-wrap">
<input type="text" class="input-field" id="input" placeholder="Describe what you need..." autofocus>
<button class="send-btn" id="sendBtn">Send</button>
</div>
<a href="search.html" class="browse-link">or search our full catalogue →</a>
</div>
<script>
var SUPABASE_URL='https://pmvgkmiihqyvgjcdcyjw.supabase.co';
var SUPABASE_KEY='sb_publishable_DEcvBo1uq0dPziHCrUwfTQ_0sq6xkz5';
var page=document.getElementById('page');
var thread=document.getElementById('thread');
var input=document.getElementById('input');
var sendBtn=document.getElementById('sendBtn');
var history=[];
var busy=false;

function formatChat(t){
var s=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
s=s.replace(/\n/g,'<br>');
return s;
}

function addMsg(role,text){
var div=document.createElement('div');
div.className='chat-msg '+role;
if(role==='assistant'){div.innerHTML=formatChat(text)}else{div.textContent=text}
thread.appendChild(div);
thread.scrollTop=thread.scrollHeight;
}

function showTyping(){
var div=document.createElement('div');
div.className='typing';div.id='typing';
div.innerHTML='<span></span><span></span><span></span>';
thread.appendChild(div);
thread.scrollTop=thread.scrollHeight;
}

function removeTyping(){var el=document.getElementById('typing');if(el)el.remove()}

async function send(){
var text=input.value.trim();
if(!text||busy)return;
input.value='';
busy=true;sendBtn.disabled=true;

if(!page.classList.contains('has-messages'))page.classList.add('has-messages');

addMsg('user',text);
history.push({role:'user',content:text});
showTyping();

try{
var res=await fetch(SUPABASE_URL+'/functions/v1/super-task',{
method:'POST',
headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
body:JSON.stringify({messages:history})
});
var data=await res.json();
var reply=(data.content&&data.content[0]&&data.content[0].text)||'Sorry, I had trouble responding. Please email james@cornhub.ai for help.';
history.push({role:'assistant',content:reply});
removeTyping();
addMsg('assistant',reply);
}catch(err){
removeTyping();
addMsg('assistant','Sorry, something went wrong. Please email james@cornhub.ai or call 1300 921 088.');
}
busy=false;sendBtn.disabled=false;
input.focus();
}

sendBtn.addEventListener('click',send);
input.addEventListener('keydown',function(e){if(e.key==='Enter')send()});
</script>
</body>
</html>
