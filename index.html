<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORN Enclosures | AI-Powered Enclosure Finder | Sydney</title>
<meta name="description" content="CORN Enclosures — find the right enclosure instantly with our AI assistant. 1000+ units in stock in Sydney.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Barlow',sans-serif;background:#0D0D0D;color:#E8E6E1}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.3}

.shell{height:100%;display:flex;flex-direction:column;position:relative;z-index:1;max-width:768px;margin:0 auto;width:100%}

/* ---- landing: everything centered as one block ---- */
.landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;transition:all .6s cubic-bezier(.4,0,.2,1)}
.logo{font-size:4.5rem;line-height:1;transition:font-size .6s cubic-bezier(.4,0,.2,1)}
.headline{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5.5vw,3.8rem);letter-spacing:.03em;color:#FAFAF8;text-align:center;margin-top:.3rem;margin-bottom:1.8rem;transition:all .6s cubic-bezier(.4,0,.2,1)}
.input-row{width:100%;max-width:600px;display:flex;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px))}
.input-field{flex:1;font-family:'Space Mono',monospace;font-size:.9rem;padding:.9rem 1.2rem;background:rgba(42,45,53,.65);border:1px solid rgba(245,197,24,.22);border-right:none;color:#E8E6E1;outline:none;transition:border-color .3s}
.input-field::placeholder{color:rgba(232,230,225,.3)}
.input-field:focus{border-color:#F5C518}
.send-btn{font-family:'Space Mono',monospace;font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;padding:.9rem 1.6rem;background:#F5C518;color:#1A1A1A;border:none;cursor:pointer;font-weight:700;transition:background .25s}
.send-btn:hover{background:#FF6B35;color:#fff}
.send-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.browse{font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:rgba(232,230,225,.35);text-decoration:none;transition:color .3s;margin-top:.8rem}
.browse:hover{color:#F5C518}

/* ---- messages (hidden until active) ---- */
.messages{display:none;overflow-y:scroll;padding:0 1.5rem;flex-direction:column;gap:.7rem;scrollbar-width:none}
.messages::-webkit-scrollbar{width:0;display:none}
.msg{max-width:min(75%,560px);padding:.75rem 1.1rem;border-radius:6px;font-family:'Barlow',sans-serif;font-size:.95rem;line-height:1.6;word-wrap:break-word;animation:msgIn .35s ease-out}
.msg.user{align-self:flex-end;background:#1A1A1A;border:1px solid rgba(245,197,24,.12);color:#E8E6E1}
.msg.assistant{align-self:flex-start;background:#2A2D35;border:1px solid rgba(245,197,24,.08);color:#E8E6E1}
.msg.assistant strong{color:#F5C518}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing{display:flex;gap:5px;padding:.75rem 1.1rem;align-self:flex-start;animation:msgIn .3s ease-out}
.typing span{width:6px;height:6px;background:#F5C518;border-radius:50%;animation:dot 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ---- bottom input (only visible in active) ---- */
.bottom{display:none;padding:1rem 1.5rem 1.5rem;flex-shrink:0}

/* ---- active state: chat mode ---- */
.shell.active .landing{flex:0;justify-content:flex-start;padding:1.2rem 1.5rem .8rem}
.shell.active .logo{font-size:2rem}
.shell.active .headline{font-size:1rem;margin-top:.1rem;margin-bottom:0}
.shell.active .landing .input-row{display:none}
.shell.active .landing .browse{display:none}
.shell.active .messages{display:flex;flex:1}
.shell.active .bottom{display:flex;flex-direction:column;align-items:center}

/* ---- mobile ---- */
@media(max-width:520px){
.logo{font-size:3.5rem}
.msg{max-width:90%}
.input-row{flex-direction:column;clip-path:none}
.input-field{border-right:1px solid rgba(245,197,24,.22);border-bottom:none}
.send-btn{padding:.75rem}
.bottom{padding:1rem 1rem 1.2rem}
.messages{padding:0 1rem}
.shell.active .landing{padding:1rem 1rem .5rem}
}
</style>
</head>
<body>
<div class="shell" id="shell">
<div class="landing">
<div class="logo">🌽</div>
<div class="headline">What enclosure do you need?</div>
<div class="input-row">
<input type="text" class="input-field" id="inputLanding" placeholder="Ask anything..." autofocus>
<button class="send-btn" id="sendLanding">Send</button>
</div>
<a href="search.html" class="browse">or search our full catalogue →</a>
</div>
<div class="messages" id="messages"></div>
<div class="bottom">
<div class="input-row">
<input type="text" class="input-field" id="inputChat" placeholder="Ask anything...">
<button class="send-btn" id="sendChat">Send</button>
</div>
</div>
</div>
<script>
var SB='https://pmvgkmiihqyvgjcdcyjw.supabase.co';
var KEY='sb_publishable_DEcvBo1uq0dPziHCrUwfTQ_0sq6xkz5';
var shell=document.getElementById('shell');
var msgs=document.getElementById('messages');
var inputLanding=document.getElementById('inputLanding');
var sendLanding=document.getElementById('sendLanding');
var inputChat=document.getElementById('inputChat');
var sendChat=document.getElementById('sendChat');
var chatHistory=[];
var busy=false;

function activeInput(){return shell.classList.contains('active')?inputChat:inputLanding}

function fmt(t){
var s=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
s=s.replace(/\n/g,'<br>');
return s;
}

function add(role,text){
var d=document.createElement('div');
d.className='msg '+role;
if(role==='assistant'){d.innerHTML=fmt(text)}else{d.textContent=text}
msgs.appendChild(d);
msgs.scrollTop=msgs.scrollHeight;
}

function dots(){
var d=document.createElement('div');
d.className='typing';d.id='dots';
d.innerHTML='<span></span><span></span><span></span>';
msgs.appendChild(d);
msgs.scrollTop=msgs.scrollHeight;
}

function undots(){var e=document.getElementById('dots');if(e)e.remove()}

async function go(){
var inp=activeInput();
var t=inp.value.trim();
if(!t||busy)return;
inp.value='';
busy=true;sendLanding.disabled=true;sendChat.disabled=true;

if(!shell.classList.contains('active')){
shell.classList.add('active');
setTimeout(function(){inputChat.focus()},100);
}

add('user',t);
chatHistory.push({role:'user',content:t});
dots();

try{
var r=await fetch(SB+'/functions/v1/super-task',{
method:'POST',
headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+KEY},
body:JSON.stringify({messages:chatHistory})
});
var d=await r.json();
var reply=(d.content&&d.content[0]&&d.content[0].text)||'Sorry, I had trouble responding. Email james@cornhub.ai for help.';
chatHistory.push({role:'assistant',content:reply});
undots();add('assistant',reply);
}catch(e){
undots();add('assistant','Something went wrong. Email james@cornhub.ai or call 1300 921 088.');
}
busy=false;
syncBtn(inputLanding,sendLanding);
syncBtn(inputChat,sendChat);
inputChat.focus();
}

function syncBtn(inp,btn){btn.disabled=!inp.value.trim()}

sendLanding.disabled=true;
sendChat.disabled=true;

inputLanding.addEventListener('input',function(){syncBtn(inputLanding,sendLanding)});
inputChat.addEventListener('input',function(){syncBtn(inputChat,sendChat)});
sendLanding.addEventListener('click',go);
sendChat.addEventListener('click',go);
inputLanding.addEventListener('keydown',function(e){if(e.key==='Enter')go()});
inputChat.addEventListener('keydown',function(e){if(e.key==='Enter')go()});
</script>
</body>
</html>
